<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CRM — Кабінет дропшипера</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0a0e17;--card:#111827;--input:#0d1220;--brd:#1e2740;--brd2:#2a3a5c;--t:#c8cdd5;--td:#5a6378;--th:#f0f2f5;--acc:#00d4aa;--accbg:rgba(0,212,170,.06);--red:#ff6b6b;--warn:#ffa726;--blue:#42a5f5;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--t);font-family:'Inter',sans-serif;min-height:100vh}
.wrap{max-width:800px;margin:0 auto;padding:24px 16px 40px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding-bottom:20px;border-bottom:1px solid var(--brd);margin-bottom:24px}
.hdr h1{font-size:18px;font-weight:700;color:var(--th)}
.hdr small{display:block;font-size:12px;color:var(--td);margin-top:2px}
.btn-logout{background:none;border:1px solid var(--brd);border-radius:8px;color:var(--td);padding:8px 14px;font-size:12px;font-family:inherit;cursor:pointer}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.sc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:16px;text-align:center}
.sc .sv{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;line-height:1}
.sc .sl{font-size:9px;color:var(--td);text-transform:uppercase;letter-spacing:.8px;margin-top:5px}
.msg{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:24px;text-align:center;color:var(--td)}
.msg .icon{font-size:44px;display:block;margin-bottom:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <h1>🛒 Кабінет дропшипера</h1>
      <small id="user-info">Завантаження...</small>
    </div>
    <button class="btn-logout" onclick="logout()">Вийти</button>
  </div>
  <div class="sg" id="stats"></div>
  <div class="msg"><span class="icon">🚧</span>Каталог товарів і створення замовлень — Модуль 2-3.<br>Скоро буде!</div>
</div>
<script>
async function init(){
  try{
    const r=await fetch("/api/auth/me");if(!r.ok)throw 0;
    const{user}=await r.json();
    document.getElementById("user-info").textContent=user.name+" · "+user.username;
    const d=await(await fetch("/api/dashboard")).json();
    document.getElementById("stats").innerHTML=`
      <div class="sc"><div class="sv" style="color:var(--acc)">${d.my_orders_total||0}</div><div class="sl">замовлень</div></div>
      <div class="sc"><div class="sv" style="color:var(--warn)">${d.my_orders_new||0}</div><div class="sl">нових</div></div>
      <div class="sc"><div class="sv" style="color:var(--acc)">${(d.my_payout||0).toFixed(0)}₴</div><div class="sl">до виплати</div></div>
    `;
  }catch(e){window.location.href="/login"}
}
async function logout(){await fetch("/api/auth/logout",{method:"POST"});window.location.href="/login"}
init();
</script>
</body>
</html>
